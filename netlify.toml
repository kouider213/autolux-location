[build]
  command = "npm run build"
    publish = ".next"

    [build.environment]
      NODE_VERSION = "20"

      [[plugins]]
        package = "@netlify/plugin-nextjs"

        [[headers]]
          for = "/manifest.json"
            [headers.values]
                Content-Type = "application/manifest+json"

                [[headers]]
                  for = "/*"
                    [headers.values]
                        X-Frame-Options = "DENY"
                            X-Content-Type-Options = "nosniff"
                                Referrer-Policy = "strict-origin-when-cross-origin"
